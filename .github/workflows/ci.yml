name: Test and Lint

on: [pull_request]

jobs:
  test:
    name: Check the source code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'

      - name: Check Flutter version
        run: flutter --version

      - name: Install packages
        run: flutter pub get

      - name: Linter
        run: flutter analyze

      - name: Test
        run: flutter test

  android-unit-test:
    name: Android plugin unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'

      - name: Install packages
        working-directory: example
        run: flutter pub get

      # Generates android/local.properties and the Gradle wrapper (both gitignored)
      # without doing a full APK build, so ./gradlew is available below.
      - name: Generate Android build config
        working-directory: example
        run: flutter build apk --config-only

      - name: Run plugin unit tests
        working-directory: example/android
        run: ./gradlew :amplitude_flutter:testDebugUnitTest

  ios-unit-test:
    name: iOS plugin unit tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'

      - name: Install packages
        working-directory: example
        run: flutter pub get

      # Download the iOS engine artifacts (Flutter.xcframework) that the Runner
      # project links against via $(FLUTTER_ROOT).
      - name: Precache iOS artifacts
        run: flutter precache --ios

      # Generates ios/Flutter/Generated.xcconfig (defines FLUTTER_ROOT) without a build.
      - name: Generate iOS build config
        working-directory: example
        run: flutter build ios --config-only --no-codesign

      - name: Install CocoaPods
        working-directory: example/ios
        run: pod install

      - name: Run plugin unit tests
        working-directory: example/ios
        run: |
          xcodebuild test \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
